<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northlight Settings Current View (v2)</title>
    <link rel="stylesheet" href="./shell.css" />
    <link rel="stylesheet" href="./assets/bundles/settings-current-view2.css" />
  </head>
  <body>
    <header class="meta" data-design-shell="settings">
      <div class="title">Settings Mockup v2</div>
      <div class="note">Sidebar layout · same viewport: 980×760.</div>
    </header>
    <main class="frame" data-design-shell="settings" title="Northlight settings current view v2">
      <div id="root"></div>
    </main>
    <script>
      (() => {
        const designShellKind = 'settings';
        const script = document.createElement('script');
        script.src = './assets/bundles/settings-current-view2.js';
        script.onerror = () => {
          const note = document.createElement('p');
          note.className = 'bundleNote';
          note.dataset.designShell = designShellKind;
          note.innerHTML = 'Missing local design bundle. Run <code>npm run build:design</code> from the project root, then reopen this page.';
          document.body.append(note);
        };
        document.body.append(script);
      })();
    </script>
  </body>
</html>
