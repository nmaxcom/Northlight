<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northlight Launcher Folder Preview</title>
    <link rel="stylesheet" href="./shell.css" />
    <link rel="stylesheet" href="./assets/bundles/launcher-current-view.css" />
  </head>
  <body data-mock-variant="folderPreview">
    <header class="meta" data-design-shell="launcher">
      <div class="title">Launcher Mockup</div>
      <div class="note">Folder result selected, metadata-focused preview.</div>
    </header>
    <main class="frame" data-design-shell="launcher" title="Northlight launcher folder preview">
      <div id="root"></div>
    </main>
    <script>
      (() => {
        const designShellKind = 'launcher';
        const script = document.createElement('script');
        script.src = './assets/bundles/launcher-current-view.js';
        script.onerror = () => {
          const note = document.createElement('p');
          note.className = 'bundleNote';
          note.dataset.designShell = designShellKind;
          note.innerHTML = 'Missing local design bundle. Run <code>npm run build:design</code> from the project root, then reopen this page.';
          document.body.append(note);
        };
        document.body.append(script);
      })();
    </script>
  </body>
</html>
