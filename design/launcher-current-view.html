<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northlight Launcher Current View</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Pro Display", ui-sans-serif, system-ui, sans-serif;
        --bg-top: #10161d;
        --bg-bottom: #0a0f14;
        --frame-line: rgba(171, 190, 208, 0.18);
        --text-0: #f3f6fa;
        --text-1: rgba(243, 246, 250, 0.66);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 24px;
        padding: 32px;
        background:
          radial-gradient(circle at top left, rgba(115, 142, 168, 0.16), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--text-0);
      }

      .meta {
        width: 1120px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 20px;
      }

      .title {
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .note {
        color: var(--text-1);
        font-size: 0.86rem;
      }

      .frame {
        width: 1120px;
        height: 760px;
        overflow: hidden;
        border-radius: 10px;
        border: 1px solid var(--frame-line);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.02),
          0 24px 70px rgba(0, 0, 0, 0.35);
        background: #0b1016;
      }

      img {
        display: block;
        width: 1120px;
        height: 760px;
      }
    </style>
  </head>
  <body>
    <header class="meta">
      <div class="title">Launcher Mockup</div>
      <div class="note">Calibrated to the native launcher content size: 1120×760.</div>
    </header>
    <main class="frame">
      <img src="./assets/launcher-current-view.png" alt="Northlight launcher current live view" />
    </main>
  </body>
</html>
