<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northlight Launcher Current View</title>
    <link rel="stylesheet" href="/src/styles/launcher-sandbox.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 24px;
        padding: 32px;
        background: #000;
        color: #f5f7fa;
        font-family: Inter, "SF Pro Display", ui-sans-serif, system-ui, sans-serif;
      }

      .meta {
        width: 1120px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 20px;
      }

      .title {
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .note {
        color: rgba(243, 246, 250, 0.66);
        font-size: 0.86rem;
      }

      .frame {
        width: 1120px;
        height: 760px;
        border-radius: 10px;
        overflow: hidden;
        display: grid;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <header class="meta">
      <div class="title">Launcher Mockup</div>
      <div class="note">Exact launcher viewport: 1120×760.</div>
    </header>
    <main class="frame" title="Northlight launcher current view">
      <div id="root"></div>
    </main>
    <script type="module">
      import { logAvailableDesigns } from '/src/design/logAvailableDesigns.ts';
      import '/src/design/launcher-current-view.tsx';
      logAvailableDesigns(window.location.pathname);
    </script>
  </body>
</html>
