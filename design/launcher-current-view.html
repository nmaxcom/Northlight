<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northlight Launcher Current View</title>
    <link rel="stylesheet" href="./shell.css" />
    <link rel="stylesheet" href="../src/styles/launcher-sandbox.css" />
    <link rel="stylesheet" href="./assets/bundles/launcher-current-view.css" />
  </head>
  <body data-mock-variant="current">
    <header class="meta" data-design-shell="launcher">
      <div class="title">Launcher Mockup</div>
      <div class="note">Exact launcher viewport: 1120×760.</div>
    </header>
    <main class="frame" data-design-shell="launcher" title="Northlight launcher current view">
      <div id="root"></div>
    </main>
    <script>
      (() => {
        const designShellKind = 'launcher';
        const designPageName = 'launcher-current-view.html';
        const script = document.createElement('script');
        script.src = './assets/bundles/launcher-current-view.js';
        script.onerror = () => {
          const note = document.createElement('p');
          note.className = 'bundleNote';
          note.dataset.designShell = designShellKind;
          note.innerHTML = 'Missing local design bundle. Run <code>npm run build:design</code> from the project root, then reopen this page.';
          document.body.append(note);
        };
        document.body.append(script);

        const pages = [
          'index.html',
          'launcher-current-view.html',
          'settings-current-view.html'
        ];
        console.log('[design] available mockups:');
        for (const path of pages) {
          const marker = path === designPageName ? '->' : '  ';
          console.log(`${marker} ${new URL(path, window.location.href).href}`);
        }
      })();
    </script>
  </body>
</html>
